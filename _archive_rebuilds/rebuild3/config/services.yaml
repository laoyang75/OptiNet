  stop_script: ./rebuild3/scripts/dev/stop_launcher.sh
  restart_script: ./rebuild3/scripts/dev/restart_launcher.sh
  start_all_script: ./rebuild3/scripts/dev/start_all.sh
  stop_all_script: ./rebuild3/scripts/dev/stop_all.sh
  status_script: ./rebuild3/scripts/dev/status.sh
